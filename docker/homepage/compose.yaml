services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    depends_on:
      glances:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID=1000
      - PGID=1000
      - HOMEPAGE_ALLOWED_HOSTS=*
    env_file:
      - version.env
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest-full
    container_name: glances
    hostname: brain
    pid: host
    volumes:
      - /:/host:ro
      - ./glances.conf:/glances.conf:ro
    environment:
      - GLANCES_OPT=-w -C /glances.conf
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:61208/api/4/status', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
