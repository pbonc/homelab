        description: "Running on brain | Ingestion API v{{HOMEPAGE_VAR_TELEMETRY_VERSION}}"
    - InfluxDB:
        icon: si-influxdb
        href: http://192.168.1.23:8086
        siteMonitor: http://192.168.1.23:8086/health
