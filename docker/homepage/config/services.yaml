---
- Infrastructure Nodes:
    - brain:
        icon: mdi-server
        description: "Active | Homelab controller"
        widgets:
          - type: glances
            url: http://glances:61208
            version: 4
            metric: info
            chart: false
            refreshInterval: 5000
          - type: glances
            url: http://glances:61208
            version: 4
            metric: fs:/host
            chart: false
            refreshInterval: 5000
    - atlas:
        icon: mdi-chip
        description: "Future | GPU server"
    - adsb-pi:
        icon: mdi-raspberry-pi
        description: "Future | ADS-B receiver node"

- Deployed Services:
    - Homepage:
        icon: mdi-view-dashboard
        href: http://192.168.1.23:3000
        description: "Running on brain | Dashboard v{{HOMEPAGE_VAR_DASHBOARD_VERSION}}"
        server: brain-docker
        container: homepage
    - Docker Engine:
        icon: mdi-docker
        siteMonitor: http://docker-proxy:2375/_ping
        description: "Running on brain | Container runtime"
    - GitHub Actions Runner:
        icon: mdi-github
        href: https://github.com/pbonc/homelab/actions
        description: "Configured on brain | Self-hosted CI runner"
    - Telemetry Collector:
        icon: mdi-access-point-network
        href: http://192.168.1.23:8000/docs
        siteMonitor: http://192.168.1.23:8000/api/health
        description: "Running on brain | Generic ingestion API"
    - InfluxDB:
        icon: si-influxdb
        href: http://192.168.1.23:8086
        siteMonitor: http://192.168.1.23:8086/health
        description: "Running on brain | Durable time-series storage"
    - Grafana:
        icon: si-grafana
        href: http://192.168.1.23:3001/d/homelab-weather/local-weather
        siteMonitor: http://192.168.1.23:3001/api/health
        description: "Running on brain | Telemetry dashboards"
    - Weather:
        icon: mdi-weather-partly-cloudy
        href: http://192.168.1.23:3001/d/homelab-weather/local-weather
        siteMonitor: http://192.168.1.23:8000/api/health
        description: "Live | Local conditions in imperial units"
    - Aikido Security:
        icon: mdi-shield-check-outline
        href: https://app.aikido.dev/
        description: "Security | Open Aikido dashboard"
    - Study Deck:
        icon: mdi-head-lightbulb-outline
        href: http://192.168.1.23:8020
        siteMonitor: http://192.168.1.23:8020/api/health
        description: "Learn | Homelab interview practice"
    - Prometheus:
        icon: si-prometheus
        href: http://192.168.1.23:9090
        siteMonitor: http://192.168.1.23:9090/-/ready
        description: "Observe | Metrics and alert evaluation"
    - Loki:
        icon: si-grafana
        href: http://192.168.1.23:3001/explore
        siteMonitor: http://192.168.1.23:3100/ready
        description: "Observe | Search Docker logs in Grafana"
    - Alloy:
        icon: mdi-pipe
        description: "Observe | Constrained Docker log collector"
        server: brain-docker
        container: alloy

- Planned Services:
    - Jenkins:
        icon: mdi-jenkins
        description: "Planned | CI/CD orchestration"
    - K3s:
        icon: mdi-kubernetes
        description: "Planned | Lightweight Kubernetes"
    - CardOS:
        icon: mdi-credit-card-outline
        description: "Planned | Portfolio application"
    - Uptime Kuma:
        icon: mdi-heart-pulse
        description: "Planned | Availability checks"
    - OWASP Juice Shop:
        icon: mdi-shield-bug-outline
        description: "Planned | Web security practice"
    - DVWA:
        icon: mdi-shield-alert-outline
        description: "Planned | Vulnerable web app training"
    - Ollama:
        icon: mdi-brain
        description: "Planned | Local LLM runtime"
    - Open WebUI:
        icon: mdi-web
        description: "Planned | Model interface"

- Future Lab:
    - Vulnerable VM Range:
        icon: mdi-lan-disconnect
        description: "Future | Isolated attack/defense lab"
