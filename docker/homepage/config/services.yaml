        siteMonitor: http://192.168.1.23:8020/api/health
        description: "Learn | Interview practice v{{HOMEPAGE_VAR_STUDY_DECK_VERSION}}"
    - Prometheus:
        icon: si-prometheus
        href: http://192.168.1.23:3001/d/homelab-platform-health/platform-health
