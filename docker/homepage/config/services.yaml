---
- Infrastructure Nodes:
    - brain:
        icon: mdi-server
        description: "Active | Homelab controller"
        widgets:
          - type: glances
            url: http://glances:61208
            version: 4
            metric: info
            chart: false
            refreshInterval: 5000
          - type: glances
            url: http://glances:61208
            version: 4
            metric: fs:/host
            chart: false
            refreshInterval: 5000
    - atlas:
        icon: mdi-chip
        description: "Future | GPU server"
    - adsb-pi:
        icon: mdi-raspberry-pi
        description: "Future | ADS-B receiver node"

- Deployed Services:
    - Homepage:
        icon: mdi-view-dashboard
        href: http://192.168.1.23:3000
        description: "Running on brain | Dashboard v{{HOMEPAGE_VAR_DASHBOARD_VERSION}}"
    - Docker Engine:
        icon: mdi-docker
        description: "Running on brain | Container runtime"
    - GitHub Actions Runner:
        icon: mdi-github
        href: https://github.com/pbonc/homelab/actions
        description: "Configured on brain | Self-hosted CI runner"

- Planned Services:
    - Jenkins:
        icon: mdi-jenkins
        description: "Planned | CI/CD orchestration"
    - K3s:
        icon: mdi-kubernetes
        description: "Planned | Lightweight Kubernetes"
    - CardOS:
        icon: mdi-credit-card-outline
        description: "Planned | Portfolio application"
    - Grafana:
        icon: mdi-chart-line
        description: "Planned | Visualization"
    - Prometheus:
        icon: mdi-timeline-clock-outline
        description: "Planned | Metrics collection"
    - Loki:
        icon: mdi-file-document-multiple-outline
        description: "Planned | Log aggregation"
    - Uptime Kuma:
        icon: mdi-heart-pulse
        description: "Planned | Availability checks"
    - Weather:
        icon: mdi-weather-partly-cloudy
        description: "Planned | Local conditions and forecast"
    - OWASP Juice Shop:
        icon: mdi-shield-bug-outline
        description: "Planned | Web security practice"
    - DVWA:
        icon: mdi-shield-alert-outline
        description: "Planned | Vulnerable web app training"
    - Ollama:
        icon: mdi-brain
        description: "Planned | Local LLM runtime"
    - Open WebUI:
