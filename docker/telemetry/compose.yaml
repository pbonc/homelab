services:
  influxdb:
    # InfluxDB OSS v2.9.1.
    image: influxdb@sha256:9f29465df7a15d427e046681cfc7b3da9753e75825c6864f8d3cf5b3aa3cca3d
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD_FILE: /run/secrets/influxdb_admin_password
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN_FILE: /run/secrets/influxdb_admin_token
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION}
    secrets:
      - influxdb_admin_password
      - influxdb_admin_token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test:
        - CMD
        - influx
        - ping
        - --host
        - http://127.0.0.1:8086
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  telemetry-collector:
    build:
      context: ../telemetry-collector
    image: homelab/telemetry-collector:0.2.0
    container_name: telemetry-collector
    ports:
      - "8000:8000"
    environment:
      TELEMETRY_LOG_LEVEL: ${TELEMETRY_LOG_LEVEL}
      TELEMETRY_STALE_AFTER_SECONDS: ${TELEMETRY_STALE_AFTER_SECONDS}
      TELEMETRY_STORAGE_BACKEND: ${TELEMETRY_STORAGE_BACKEND}
      TELEMETRY_ALLOWED_ORIGINS: ${TELEMETRY_ALLOWED_ORIGINS}
      INFLUXDB_URL: ${INFLUXDB_URL}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN_FILE: /run/secrets/influxdb_collector_token
    secrets:
      - influxdb_collector_token
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  grafana:
    # Grafana OSS v12.4.0.
    image: grafana/grafana@sha256:b0ae311af06228bcfd4a620504b653db80f5b91e94dc3dc2a5b7dab202bcde20
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_HIDE_VERSION: "true"
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - export INFLUXDB_TOKEN="$$(cat /run/secrets/influxdb_grafana_token)"; exec /run.sh
    secrets:
      - grafana_admin_password
      - influxdb_grafana_token
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

secrets:
  influxdb_admin_password:
    file: ./secrets/influxdb_admin_password.txt
  influxdb_admin_token:
    file: ./secrets/influxdb_admin_token.txt
  influxdb_collector_token:
    file: ./secrets/influxdb_collector_token.txt
  influxdb_grafana_token:
    file: ./secrets/influxdb_grafana_token.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
