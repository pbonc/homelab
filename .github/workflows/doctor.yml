name: Homelab Doctor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  doctor:
    name: Run labctl doctor on brain
    runs-on:
      - self-hosted
      - Linux
      - X64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run doctor
        run: make doctor
